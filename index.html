<script>
    let pieces = 0;

    function updateCoins() {
        document.querySelectorAll(".coinDisplay").forEach(el => {
            el.textContent = pieces + " 💰";
        });
    }

    function addLetter(button, letter) {
        let level = button.closest(".level");
        let slots = level.querySelectorAll(".word span");

        for (let slot of slots) {
            if (slot.textContent === "") {
                slot.textContent = letter;
                button.disabled = true;
                break;
            }
        }
    }

    function checkWord(correctWord, levelNum) {
        let level = document.getElementById("level" + levelNum);
        let slots = level.querySelectorAll(".word span");
        let word = "";

        slots.forEach(s => word += s.textContent);

        let msg = document.getElementById("msg" + levelNum);

        if (word === correctWord) {
            msg.textContent = "✅ Bravo !";

            // +10 pièces à chaque bonne réponse
            pieces += 10;
            updateCoins();

            setTimeout(() => {
                level.style.display = "none";

                let nextLevel = levelNum + 1;
                let next = document.getElementById("level" + nextLevel);

                if (next) {
                    next.style.display = "flex";
                } else {
                    let endScreen = document.getElementById("endScreen");
                    endScreen.style.display = "flex";
                    document.getElementById("finalCoins").textContent = "Pièces totales : " + pieces + " 💰";
                }

            }, 1000);

        } else {
            msg.textContent = "❌ Mauvais mot";

            setTimeout(() => {
                slots.forEach(s => s.textContent = "");
                let buttons = level.querySelectorAll(".letters button");
                buttons.forEach(btn => btn.disabled = false);
                msg.textContent = "";
            }, 1000);
        }
    }
</script>
